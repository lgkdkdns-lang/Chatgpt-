<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Müllmonster</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="game">

<div id="score">
Punkte: <span id="points">0</span>
</div>

<div id="player"></div>

<div id="gameOver">

<h1>Game Over</h1>

<p>
Du hast das Haus vermüllen lassen!
</p>

<button id="restart">
Neu starten
</button>

</div>

</div>

<!-- Touch Steuerung -->

<div id="controls">

<button id="up">▲</button>

<div class="row">

<button id="left">◀</button>

<button id="down">▼</button>

<button id="right">▶</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
